<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sprint Trainer</title>
    <style>
        :root { --bg: #0a0a0c; --card: #16161a; --primary: #00ff88; --accent: #3b82f6; --danger: #ff4757; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 20px; text-align: center; }
        .app-container { max-width: 400px; margin: auto; }
        .glass-card { background: var(--card); padding: 25px; border-radius: 24px; border: 1px solid #2d2d35; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .input-box { display: flex; justify-content: space-between; align-items: center; margin: 15px 0; font-size: 0.9rem; color: #a1a1aa; }
        input { background: #23232b; border: 1px solid #3f3f46; color: var(--primary); padding: 8px; border-radius: 10px; width: 60px; text-align: center; font-weight: bold; font-size: 1rem; }
        #indicator { width: 180px; height: 180px; border-radius: 50%; margin: 30px auto; background: #16161a; border: 10px solid #23232b; display: flex; align-items: center; justify-content: center; font-size: 5rem; font-weight: 900; transition: all 0.1s; }
        #status { font-size: 2.2rem; font-weight: 800; height: 60px; margin-bottom: 5px; letter-spacing: -1px; }
        .btn-main { width: 100%; padding: 24px; font-size: 1.5rem; border: none; border-radius: 20px; cursor: pointer; font-weight: bold; background: var(--primary); color: #000; box-shadow: 0 0 20px rgba(0, 255, 136, 0.2); transition: 0.2s; }
        .btn-main:active { transform: scale(0.96); }
        .btn-main:disabled { background: #3f3f46; color: #71717a; box-shadow: none; }
        .history { margin-top: 25px; text-align: left; background: #000; padding: 15px; border-radius: 15px; max-height: 120px; overflow-y: auto; font-family: monospace; font-size: 0.85rem; border: 1px solid #23232b; }
        .log { border-bottom: 1px solid #16161a; padding: 6px 0; display: flex; justify-content: space-between; color: #71717a; }
    </style>
</head>
<body>

<div class="app-container">
    <h1 style="color: #52525b; font-size: 1rem; letter-spacing: 3px; margin-bottom: 20px;">SPRINT START</h1>

    <div class="glass-card">
        <div class="input-box"><span>Preparation (s)</span><input type="number" id="p" value="5"></div>
        <div class="input-box"><span>On Your Marks (s)</span><input type="number" id="m" value="15.0" step="0.1"></div>
        <div class="input-box"><span>Set Hold (range)</span>
            <div><input type="number" id="min" value="1.5" step="0.1"> - <input type="number" id="max" value="3.0" step="0.1"></div>
        </div>
    </div>

    <div id="status">READY</div>
    <div id="indicator"></div>
    <button class="btn-main" id="go">START</button>

    <div class="history" id="logs"></div>
</div>

<script>
    let actx = null;
    const voice = window.speechSynthesis;
    const btn = document.getElementById('go');

    function init() {
        if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
        if (actx.state === 'suspended') actx.resume();
        voice.speak(new SpeechSynthesisUtterance(""));
    }

    function beep(f, d, v=0.1) {
        const o = actx.createOscillator(); const g = actx.createGain();
        o.frequency.value = f; g.gain.setValueAtTime(v, actx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, actx.currentTime + d);
        o.connect(g); g.connect(actx.destination); o.start(); o.stop(actx.currentTime + d);
    }

    function say(t) {
        voice.cancel(); const m = new SpeechSynthesisUtterance(t);
        m.lang = 'en-US'; m.rate = 1.0; voice.speak(m);
    }

    // DISPARO INTENSO (RUIDO BLANCO FILTRADO)
    function fire() {
        const bufferSize = actx.sampleRate * 0.5;
        const buffer = actx.createBuffer(1, bufferSize, actx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;

        const noise = actx.createBufferSource();
        noise.buffer = buffer;

        const filter = actx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.setValueAtTime(800, actx.currentTime);

        const gain = actx.createGain();
        gain.gain.setValueAtTime(2.5, actx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + 0.4);

        noise.connect(filter);
        filter.connect(gain);
        gain.connect(actx.destination);

        noise.start();
        if (navigator.vibrate) navigator.vibrate([500, 100, 500]);
    }

    btn.onclick = async () => {
        init(); btn.disabled = true;
        const prep = parseInt(document.getElementById('p').value);
        const marks = parseFloat(document.getElementById('m').value) * 1000;
        const minVal = parseFloat(document.getElementById('min').value) * 1000;
        const maxVal = parseFloat(document.getElementById('max').value) * 1000;
        const hold = Math.floor(Math.random() * (maxVal - minVal + 1)) + minVal;

        document.getElementById('status').innerText = "PREP";
        document.getElementById('indicator').style.borderColor = "#3b82f6";
        for (let i = prep; i > 0; i--) {
            document.getElementById('indicator').innerText = i;
            beep(1000, 0.1); await new Promise(r => setTimeout(r, 1000));
        }
        
        document.getElementById('indicator').innerText = "";
        beep(500, 0.4, 0.2); await new Promise(r => setTimeout(r, 600));

        document.getElementById('status').innerText = "ON YOUR MARKS";
        document.getElementById('indicator').style.borderColor = "#fbbf24";
        say("On your marks"); await new Promise(r => setTimeout(r, marks));

        document.getElementById('status').innerText = "SET";
        document.getElementById('indicator').style.borderColor = "#f97316";
        say("Set"); await new Promise(r => setTimeout(r, hold));

        document.getElementById('status').innerText = "GO!";
        document.getElementById('indicator').style.borderColor = "#ff4757";
        document.getElementById('indicator').style.backgroundColor = "#ff4757";
        fire();

        const log = document.createElement('div');
        log.className = 'log'; log.innerHTML = `<span>Trial #${document.getElementById('logs').children.length+1}</span> <b>${(hold/1000).toFixed(2)}s hold</b>`;
        document.getElementById('logs').prepend(log);

        setTimeout(() => {
            btn.disabled = false; document.getElementById('status').innerText = "READY";
            document.getElementById('indicator').style.borderColor = "#23232b";
            document.getElementById('indicator').style.backgroundColor = "transparent";
        }, 3000);
    };
</script>
</body>
</html>
